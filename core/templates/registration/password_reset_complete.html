<!DOCTYPE html>
{% load static %}
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#060608">
  <title>Senha redefinida - Clube de Programação</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style_login.css' %}">
</head>
<body>

  <div class="bg-scene" aria-hidden="true">
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="login-container">

    <div class="login-header">
      <img src="{% static 'images/logo.png' %}" alt="Logo Clube de Programação" class="login-logo">
      <h1>Senha redefinida!</h1>
      <p>Sua senha foi alterada com sucesso. Agora você pode fazer login.</p>
    </div>

    <div class="login-card">
      <a href="{% url 'login' %}" class="btn-login" style="display: block; text-align: center; text-decoration: none;">Ir para o login</a>
    </div>

  </div>

</body>
</html>
